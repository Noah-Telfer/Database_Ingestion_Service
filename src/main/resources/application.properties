spring.application.name=database_service

spring.kafka.admin.properties.retry.backoff.ms=5000
spring.kafka.admin.properties.reconnect.backoff.ms=5000

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.listener.ack-mode=record
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=earliest

# Enviornment Variables with default values
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:database_service_group}
kafka.retry.attempts=${KAFKA_RETRY_ATTEMPTS:3}
kafka.retry.interval.ms=${KAFKA_RETRY_INTERVAL_MS:2000}
kafka.topic.name=${KAFKA_TOPIC_NAME:database_service_topic}


#db properties
# 1. The Connection URL 
spring.datasource.url=jdbc:sqlserver://sql-server:1433;databaseName=MainframeDB;encrypt=true;trustServerCertificate=true;

# 2. The Credentials
spring.datasource.username=sa
spring.datasource.password=YourStrong!Pass123

# 3. The Driver
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 4. Hibernate Strategy 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true